<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacete AW — Solicitação de Capacetes Personalizados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold">🪖</div>
                <div>
                    <h1 class="text-4xl font-bold text-gray-900">Capasseteaw</h1>
                    <p class="text-gray-600 text-sm">Personalização de Capacetes - ATV Honrade</p>
                </div>
            </div>
            <a href="/login" 
               class="px-6 py-3 bg-white border border-gray-300 rounded-2xl font-medium hover:bg-gray-50 transition-colors flex items-center gap-2">
                <i class="fas fa-chart-bar"></i> Dashboard
            </a>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12">
            <h2 class="text-3xl font-semibold text-gray-800 mb-2">Nova Solicitação</h2>
            <p class="text-gray-600 mb-8">Preencha os dados para iniciar o processo de personalização.</p>

            <form id="solicitacaoForm" class="space-y-8">
                <!-- Dados do Solicitante -->
                <div>
                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fas fa-user"></i> Dados do Solicitante
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nome Completo</label>
                            <input type="text" id="nome" name="nome" required
                                   class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">E-mail</label>
                            <input type="email" id="email" name="email" required
                                   class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg">
                        </div>
                    </div>
                </div>

                <!-- Dados do Cliente -->
                <div>
                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fas fa-building"></i> Dados do Cliente
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nome do Cliente</label>
                            <input type="text" id="cliente" name="cliente" required
                                   class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Site do Cliente</label>
                            <input type="url" id="site_cliente" name="site_cliente"
                                   class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg">
                        </div>
                    </div>
                </div>

                <!-- Dados do Parceiro -->
                <div>
                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fas fa-handshake"></i> Dados do Parceiro
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nome do Parceiro/Gerenciadora</label>
                            <input type="text" id="parceiro" name="parceiro"
                                   class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Site do Parceiro</label>
                            <input type="url" id="site_parceiro" name="site_parceiro"
                                   class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg">
                        </div>
                    </div>
                </div>

                <!-- Dados do Pedido -->
                <div>
                    <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fas fa-clipboard-list"></i> Dados do Pedido
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Quantidade de Capacetes</label>
                            <input type="number" id="quantidade" name="quantidade" min="1" required
                                   class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Projeto/Obra</label>
                            <input type="text" id="projeto" name="projeto" required
                                   class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Cidade</label>
                            <input type="text" id="cidade" name="cidade" required
                                   class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Estado</label>
                            <input type="text" id="estado" name="estado" maxlength="2" required
                                   class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg">
                        </div>
                    </div>
                </div>

                <!-- Observações -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Observações</label>
                    <textarea id="observacoes" name="observacoes" rows="4"
                              class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg resize-y"></textarea>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 transition-all text-white font-semibold text-xl py-6 rounded-3xl flex items-center justify-center gap-3 shadow-lg shadow-blue-500/30">
                    <i class="fas fa-paper-plane"></i>
                    ENVIAR SOLICITAÇÃO
                </button>
            </form>
        </div>

        <div class="text-center mt-8 text-sm text-gray-500">
            Capacete AW · Athié Wohnrath · Uso interno
        </div>
    </div>

    <script>
        document.getElementById('solicitacaoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('nome', document.getElementById('nome').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('cliente', document.getElementById('cliente').value);
            formData.append('site_cliente', document.getElementById('site_cliente').value);
            formData.append('parceiro', document.getElementById('parceiro').value);
            formData.append('site_parceiro', document.getElementById('site_parceiro').value);
            formData.append('quantidade', document.getElementById('quantidade').value);
            formData.append('projeto', document.getElementById('projeto').value);
            formData.append('cidade', document.getElementById('cidade').value);
            formData.append('estado', document.getElementById('estado').value);
            formData.append('observacoes', document.getElementById('observacoes').value);

            try {
                const response = await fetch('/solicitacoes/', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert(`✅ Solicitação enviada com sucesso!\n\nProtocolo: ${data.protocolo}\n\nO retorno será realizado em até 48 horas.`);
                    e.target.reset();
                } else {
                    alert('Erro: ' + (data.detail || 'Falha ao enviar solicitação'));
                }
            } catch (error) {
                alert('Erro de conexão. Tente novamente.');
            }
        });
    </script>
</body>
</html>
