<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapaceteAW — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--aw-preto:#000;--aw-branco:#FFF;--aw-prata:#BFBFBF;--aw-tiffany:#00DEDB;--aw-dark-tiffany:#00585C;--aw-tiffany-wash:rgba(0,222,219,.12);--aw-prata-wash:rgba(191,191,191,.25);--aw-font:'Montserrat','Helvetica Neue',Arial,sans-serif;}
    body{font-family:var(--aw-font);background:var(--aw-branco);color:var(--aw-preto);min-height:100dvh;}

    nav{background:var(--aw-preto);height:56px;display:flex;align-items:center;padding:0 32px;justify-content:space-between;position:sticky;top:0;z-index:10;}
    .nav-brand{display:flex;align-items:center;gap:12px;}
    .nav-accent{width:3px;height:20px;background:var(--aw-tiffany);}
    .nav-name{font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--aw-branco);}
    .nav-right{display:flex;align-items:center;gap:16px;}
    .badge-perfil{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border:1px solid var(--aw-tiffany);color:var(--aw-tiffany);}
    .nav-user{font-size:12px;color:var(--aw-prata);}
    .btn-logout{font-size:11px;color:var(--aw-prata);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;transition:color .2s;}
    .btn-logout:hover{color:var(--aw-branco);}

    .hero{background:var(--aw-tiffany);padding:32px 32px 28px;}
    .hero-flex{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
    .hero-title{font-size:22px;font-weight:700;color:var(--aw-preto);letter-spacing:-0.3px;}
    .hero-desc{font-size:12px;color:var(--aw-dark-tiffany);margin-top:4px;}
    .btn-new{display:inline-flex;align-items:center;gap:6px;background:var(--aw-preto);color:var(--aw-branco);border:none;padding:11px 20px;font-family:var(--aw-font);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:background .2s;}
    .btn-new:hover{background:#222;}

    .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
    .summary-card{background:var(--aw-branco);padding:22px 24px;}
    .summary-num{font-size:38px;font-weight:700;color:var(--aw-dark-tiffany);line-height:1;}
    .summary-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--aw-prata);margin-top:6px;font-weight:500;}

    .content{padding:24px 32px 40px;}
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
    .filter-chip{font-size:11px;font-weight:700;padding:7px 14px;border:1px solid var(--aw-prata);background:var(--aw-branco);color:var(--aw-prata);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.05em;}
    .filter-chip:hover{border-color:var(--aw-preto);color:var(--aw-preto);}
    .filter-chip.active{background:var(--aw-preto);color:var(--aw-branco);border-color:var(--aw-preto);}
    .search-wrap{flex:1;min-width:180px;max-width:320px;position:relative;}
    .search-wrap input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--aw-prata);font-size:12px;font-family:var(--aw-font);outline:none;color:var(--aw-preto);transition:border-color .2s;background:var(--aw-branco);}
    .search-wrap input:focus{border-color:var(--aw-tiffany);}
    .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--aw-prata);font-size:12px;pointer-events:none;}

    .table-wrap{background:var(--aw-branco);overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:12px 18px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--aw-prata);border-bottom:2px solid var(--aw-tiffany);}
    tbody tr{border-bottom:1px solid var(--aw-prata-wash);transition:background .1s;cursor:pointer;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:var(--aw-tiffany-wash);}
    tbody td{padding:14px 18px;font-size:12px;color:var(--aw-preto);vertical-align:middle;}
    .td-proto{font-weight:500;color:var(--aw-prata);letter-spacing:.03em;font-size:11px;}
    .td-cliente{font-weight:700;color:var(--aw-preto);}
    .td-projeto{color:var(--aw-prata);font-size:11px;margin-top:2px;}
    .status-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;letter-spacing:.03em;text-transform:uppercase;}
    .s-pending{background:var(--aw-tiffany-wash);color:var(--aw-dark-tiffany);}
    .s-done{background:rgba(0,88,92,.1);color:var(--aw-dark-tiffany);}
    .s-canceled{background:rgba(191,191,191,.2);color:var(--aw-prata);}
    .needs-action{width:8px;height:8px;background:var(--aw-tiffany);display:inline-block;margin-right:6px;}

    .empty{text-align:center;padding:80px 24px;color:var(--aw-prata);font-size:13px;}
    .empty-title{font-size:15px;font-weight:700;color:var(--aw-preto);margin-bottom:6px;}
    .loading{text-align:center;padding:60px;color:var(--aw-prata);font-size:12px;}

    .footer{background:var(--aw-dark-tiffany);padding:14px 32px;display:flex;justify-content:space-between;align-items:center;}
    .footer-text{font-size:10px;color:rgba(255,255,255,.5);}
    .footer-logo{height:16px;opacity:.7;}

    @media(max-width:700px){
      nav{padding:0 16px;}.content{padding:16px;}.hero{padding:24px 16px 20px;}
      .nav-user{display:none;}table thead{display:none;}
      table,tbody,tr,td{display:block;}tbody tr{padding:12px 0;}tbody td{padding:4px 16px;border:none;}
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand"><div class="nav-accent"></div><span class="nav-name">CapaceteAW</span></div>
  <div class="nav-right">
    <span class="badge-perfil" id="navPerfil">—</span>
    <span class="nav-user" id="navNome">—</span>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-flex">
    <div><div class="hero-title">Pedidos de capacetes</div><div class="hero-desc" id="pageDesc">Carregando…</div></div>
    <a href="/" class="btn-new">+ Nova solicitação</a>
  </div>
  <div class="summary">
    <div class="summary-card"><div class="summary-num" id="totalAbertos">—</div><div class="summary-label">Em andamento</div></div>
    <div class="summary-card"><div class="summary-num" id="totalArte">—</div><div class="summary-label">Aprovar arte</div></div>
    <div class="summary-card"><div class="summary-num" id="totalConcluidos">—</div><div class="summary-label">Concluídos</div></div>
    <div class="summary-card"><div class="summary-num" id="totalTodos">—</div><div class="summary-label">Total</div></div>
  </div>
</div>

<div class="content">
  <div class="filters">
    <div class="search-wrap"><span class="search-icon">⌕</span><input type="text" id="busca" placeholder="Protocolo ou cliente…" oninput="renderTabela()"></div>
    <button class="filter-chip active" data-status="" onclick="setFiltro(this)">Todos</button>
    <button class="filter-chip" data-status="Aguardando Aprovação Marketing" onclick="setFiltro(this)">Marketing</button>
    <button class="filter-chip" data-status="Arte Disponível para Aprovação" onclick="setFiltro(this)">Arte</button>
    <button class="filter-chip" data-status="Em Produção" onclick="setFiltro(this)">Produção</button>
    <button class="filter-chip" data-status="Concluído" onclick="setFiltro(this)">Concluídos</button>
  </div>
  <div class="table-wrap" id="tableWrap"><div class="loading">Carregando pedidos…</div></div>
</div>

<div class="footer">
  <div class="footer-text">CapaceteAW · Athié Wohnrath · Uso interno</div>

<script>
const token=localStorage.getItem('aw_token'),perfil=localStorage.getItem('aw_perfil'),nome=localStorage.getItem('aw_nome'),email=localStorage.getItem('aw_email');
if(!token)window.location.href='/login';
document.getElementById('navPerfil').textContent=perfil||'—';
document.getElementById('navNome').textContent=nome||'—';
function logout(){['aw_token','aw_perfil','aw_nome','aw_email','aw_email_login'].forEach(k=>localStorage.removeItem(k));window.location.href='/login';}

let todosPedidos=[],filtroStatus='';
function setFiltro(btn){document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));btn.classList.add('active');filtroStatus=btn.dataset.status;renderTabela();}

function badgeClass(s){if(!s)return's-pending';const l=s.toLowerCase();if(l.includes('concluíd')||l.includes('concluido'))return's-done';if(l.includes('cancelad'))return's-canceled';return's-pending';}

const NEEDS_ACTION={'Marketing':['Aguardando Aprovação Marketing'],'Compras':['Aguardando Aprovação Compras'],'Fornecedor':['Fornecedor Atribuído','Arte Aprovada','Aguardando Liberação Produção'],'Solicitante':['Arte Disponível para Aprovação']};
function precisaAcao(s){return(NEEDS_ACTION[perfil]||[]).includes(s);}
function filtrarPorPerfil(l){if(perfil==='Solicitante')return l.filter(s=>s.email===email);if(perfil==='Fornecedor')return l.filter(s=>s.fornecedor_id);return l;}

function renderTabela(){
  const busca=document.getElementById('busca').value.trim().toLowerCase();
  let lista=filtrarPorPerfil(todosPedidos).filter(s=>!filtroStatus||s.status===filtroStatus).filter(s=>!busca||s.protocolo.toLowerCase().includes(busca)||(s.cliente||'').toLowerCase().includes(busca)||(s.projeto||'').toLowerCase().includes(busca));
  document.getElementById('pageDesc').textContent=lista.length+' pedido'+(lista.length!==1?'s':'')+' '+(filtroStatus?'· '+filtroStatus:'');
  if(!lista.length){document.getElementById('tableWrap').innerHTML='<div class="empty"><div class="empty-title">Nenhum pedido encontrado</div>Ajuste os filtros ou crie uma nova solicitação.</div>';return;}
  lista.sort((a,b)=>precisaAcao(b.status)-precisaAcao(a.status));
  document.getElementById('tableWrap').innerHTML='<table><thead><tr><th>Protocolo</th><th>Cliente / Projeto</th><th>Qtd.</th><th>Local</th><th>Status</th><th>Data</th></tr></thead><tbody>'+lista.map(s=>'<tr onclick="window.location=\'/solicitacoes/'+s.protocolo+'\'"><td class="td-proto">'+s.protocolo+'</td><td><div class="td-cliente">'+(precisaAcao(s.status)?'<span class="needs-action"></span>':'')+(s.cliente||'—')+'</div><div class="td-projeto">'+(s.projeto||'')+'</div></td><td>'+(s.quantidade||'—')+'</td><td style="white-space:nowrap">'+(s.cidade||'')+(s.estado?', '+s.estado:'')+'</td><td><span class="status-badge '+badgeClass(s.status)+'">'+s.status+'</span></td><td style="white-space:nowrap;color:var(--aw-prata)">'+(s.data_abertura?s.data_abertura.slice(0,10):'—')+'</td></tr>').join('')+'</tbody></table>';
}

async function carregar(){
  try{const r=await fetch('/solicitacoes/lista',{headers:{'Authorization':'Bearer '+token}});
    if(r.status===401){logout();return;}const data=await r.json();todosPedidos=data.solicitacoes||[];
    const v=filtrarPorPerfil(todosPedidos);
    document.getElementById('totalAbertos').textContent=v.filter(s=>!['Concluído','Cancelado'].includes(s.status)).length;
    document.getElementById('totalArte').textContent=v.filter(s=>s.status==='Arte Disponível para Aprovação').length;
    document.getElementById('totalConcluidos').textContent=v.filter(s=>s.status==='Concluído').length;
    document.getElementById('totalTodos').textContent=v.length;renderTabela();
  }catch{document.getElementById('tableWrap').innerHTML='<div class="empty"><div class="empty-title">Erro ao carregar</div>Verifique sua conexão e recarregue.</div>';}
}
carregar();
</script>
