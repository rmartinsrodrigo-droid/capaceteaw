<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapaceteAW — Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --aw-preto: #000000;
      --aw-branco: #FFFFFF;
      --aw-prata: #BFBFBF;
      --aw-tiffany: #00DEDB;
      --aw-dark-tiffany: #00585C;
      --aw-tiffany-wash: rgba(0,222,219,0.12);
      --aw-font: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
    }
    body { font-family: var(--aw-font); background: var(--aw-tiffany); margin: 0; min-height: 100dvh; display: flex; flex-direction: column; }

    .login-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 20px; position: relative;
    }

    .logo-corner {
      position: absolute; top: 28px; left: 32px; height: 28px;
    }

    .card {
      background: var(--aw-branco); width: 100%; max-width: 420px;
      padding: 52px 44px 56px;
    }

    .card-label {
      font-size: 11px; font-weight: 700; letter-spacing: .12em;
      color: var(--aw-prata); text-transform: uppercase; margin-bottom: 8px;
    }
    .card-title {
      font-size: 26px; font-weight: 700; color: var(--aw-preto);
      letter-spacing: -0.5px; margin-bottom: 4px;
    }
    .card-sub { font-size: 13px; color: var(--aw-prata); margin-bottom: 36px; }

    .divider { height: 1px; background: var(--aw-prata); margin-bottom: 32px; }

    .step { display: none; }
    .step.active { display: block; }

    .step-title { font-size: 16px; font-weight: 700; color: var(--aw-preto); margin-bottom: 4px; }
    .step-sub { font-size: 12px; color: var(--aw-prata); line-height: 1.5; margin-bottom: 28px; }
    .step-sub strong { color: var(--aw-preto); font-weight: 500; }

    .field { margin-bottom: 24px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--aw-preto); margin-bottom: 10px;
    }
    .field input {
      width: 100%; border: none; border-bottom: 2px solid var(--aw-prata);
      padding: 12px 0; font-size: 15px; font-family: var(--aw-font);
      color: var(--aw-preto); background: transparent; outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-bottom-color: var(--aw-tiffany); }
    .field input::placeholder { color: #D0D0D0; }

    .otp-boxes { display: flex; gap: 12px; margin-bottom: 32px; justify-content: center; }
    .otp-box {
      width: 46px; height: 58px; border: none; border-bottom: 2px solid var(--aw-prata);
      text-align: center; font-size: 24px; font-weight: 700;
      font-family: var(--aw-font); color: var(--aw-preto);
      background: transparent; outline: none; transition: border-color .2s;
    }
    .otp-box:focus { border-bottom-color: var(--aw-tiffany); }

    .btn-primary {
      width: 100%; padding: 16px; background: var(--aw-preto); color: var(--aw-branco);
      border: none; font-family: var(--aw-font); font-size: 12px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
      transition: background .2s;
    }
    .btn-primary:hover { background: #222; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .link-sec {
      display: block; text-align: center; margin-top: 20px;
      font-size: 12px; color: var(--aw-prata); text-decoration: none;
      cursor: pointer; transition: color .2s;
    }
    .link-sec:hover { color: var(--aw-preto); }

    .error-msg { font-size: 12px; color: #B04040; margin-top: 14px; min-height: 16px; text-align: center; }

    .footer {
      background: var(--aw-dark-tiffany); padding: 16px 32px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-left { font-size: 10px; color: rgba(255,255,255,.5); letter-spacing: .04em; }
    .footer-logo { height: 18px; opacity: .7; }

    @media (max-width: 500px) {
      .card { padding: 40px 28px 44px; }
      .otp-box { width: 40px; height: 50px; font-size: 20px; }
    }
  </style>
</head>

<script>
function showStep(n){document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById('step'+n).classList.add('active');}
function setLoading(b,s,t,on){document.getElementById(b).disabled=on;document.getElementById(s).style.display=on?'block':'none';document.getElementById(t).style.display=on?'none':'inline';}
function setErr(id,m){document.getElementById(id).textContent=m;}

async function enviarCodigo(){
  const email=document.getElementById('emailInput').value.trim();
  if(!email){setErr('err1','Informe o e-mail.');return;}
  setErr('err1','');setLoading('btnEnviar','spinEnviar','btnEnviarText',true);
  try{const fd=new FormData();fd.append('email',email);
    const r=await fetch('/auth/solicitar_otp',{method:'POST',body:fd});
    const data=await r.json();
    if(!r.ok){setErr('err1',data.detail||'Erro ao enviar código.');return;}
    document.getElementById('emailLabel').textContent=email;
    localStorage.setItem('aw_email_login',email);showStep(2);
    setTimeout(()=>document.getElementById('d0').focus(),50);
  }catch{setErr('err1','Erro de conexão. Tente novamente.');}
  finally{setLoading('btnEnviar','spinEnviar','btnEnviarText',false);}
}

async function verificarCodigo(){
  const otp=[0,1,2,3,4,5].map(i=>document.getElementById('d'+i).value).join('');
  if(otp.length<6){setErr('err2','Digite os 6 dígitos.');return;}
  setErr('err2','');setLoading('btnEntrar','spinEntrar','btnEntrarText',true);
  try{const email=localStorage.getItem('aw_email_login')||'';
    const fd=new FormData();fd.append('email',email);fd.append('otp',otp);
    const r=await fetch('/auth/verificar_otp',{method:'POST',body:fd});
    const data=await r.json();
    if(!r.ok){setErr('err2',data.detail||'Código inválido.');
      document.querySelectorAll('.otp-box').forEach(b=>b.value='');document.getElementById('d0').focus();return;}
    localStorage.setItem('aw_token',data.token);localStorage.setItem('aw_perfil',data.perfil);
    localStorage.setItem('aw_nome',data.nome);localStorage.setItem('aw_email',data.email);
    window.location.href='/dashboard';
  }catch{setErr('err2','Erro de conexão.');}
  finally{setLoading('btnEntrar','spinEntrar','btnEntrarText',false);}
}

async function reenviar(){
  const email=localStorage.getItem('aw_email_login')||'';
  if(!email){showStep(1);return;}
  document.getElementById('linkReenviar').textContent='Enviando…';
  const fd=new FormData();fd.append('email',email);
  try{await fetch('/auth/solicitar_otp',{method:'POST',body:fd});}catch{}
  document.getElementById('linkReenviar').textContent='Código reenviado ✓';
  document.querySelectorAll('.otp-box').forEach(b=>b.value='');document.getElementById('d0').focus();
  setTimeout(()=>{document.getElementById('linkReenviar').textContent='Reenviar código';},3000);
}

document.querySelectorAll('.otp-box').forEach((box,i,all)=>{
  box.addEventListener('input',e=>{const v=e.target.value.replace(/\D/g,'');e.target.value=v.slice(-1);if(v&&i<5)all[i+1].focus();if([...all].every(b=>b.value))verificarCodigo();});
  box.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!box.value&&i>0)all[i-1].focus();});
});
document.getElementById('d0').addEventListener('paste',e=>{e.preventDefault();const d=(e.clipboardData.getData('text').replace(/\D/g,'')).slice(0,6);d.split('').forEach((c,i)=>{const b=document.getElementById('d'+i);if(b)b.value=c;});const l=document.getElementById('d'+Math.min(d.length,5));if(l)l.focus();if(d.length===6)verificarCodigo();});
document.getElementById('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')enviarCodigo();});
if(localStorage.getItem('aw_token'))window.location.href='/dashboard';
</script>
</body>
